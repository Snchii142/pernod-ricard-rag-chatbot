# -------------------------------------------------------
# Pernod Ricard RAG Chatbot — Docker Compose
# Usage: docker compose up
# -------------------------------------------------------

version: "3.8"

services:
  chatbot:
    build: .
    container_name: pernod-rag-chatbot
    ports:
      - "8501:8501"
    env_file:
      - .env                      # GROQ_API_KEY loaded from here
    volumes:
      - ./data:/app/data          # persist scraped knowledge base
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s